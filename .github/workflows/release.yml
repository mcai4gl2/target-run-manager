name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0) — must match package.json'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create and push the git tag
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - run: npm ci

      # Type-check and test before building
      - run: npx tsc --noEmit
      - run: npm test

      # Bundle TypeScript + dependencies into a single dist/extension.js
      - run: npm run bundle

      # Package once — all subsequent steps publish this exact artifact
      - name: Package extension
        run: npx vsce package --out extension.vsix

      # Smoke-check: verify the bundled extension inside the VSIX
      #   1. js-yaml is inlined (the root cause of the original activation failure)
      #   2. all 19 commands are registered
      - name: Verify bundle contents
        run: |
          JS=$(unzip -p extension.vsix extension/dist/extension.js)
          echo "$JS" | grep -q "js-yaml" || (echo "✗ js-yaml not bundled" && exit 1)
          COUNT=$(echo "$JS" | grep -c "registerCommand")
          [ "$COUNT" -eq 19 ] || (echo "✗ expected 19 registerCommand calls, got $COUNT" && exit 1)
          echo "✓ js-yaml bundled, $COUNT commands registered"

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx vsce publish --packagePath extension.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish extension.vsix --pat "$OVSX_PAT"

      - name: Tag release
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PKG_VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
