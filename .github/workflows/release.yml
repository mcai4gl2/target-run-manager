name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0) — must match package.json'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create and push the git tag

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run package

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ secrets.OVSX_PAT != '' }}
        run: npx ovsx publish *.vsix --pat ${{ secrets.OVSX_PAT }}

      - name: Tag release
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PKG_VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
